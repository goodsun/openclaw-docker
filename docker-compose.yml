# bon-soleil Holdings — Container Office
# Mephi-approved configuration (98/100)
# Phase 1: Alice PoC

services:
  # みぃちゃん（goodsunアシスタント）
  mie:
    build: .
    image: bonsoleil/openclaw:latest
    container_name: mie-openclaw
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    volumes:
      - ./instances/mie/.openclaw:/home/node/.openclaw
      - ./instances/mie/workspace:/home/node/.openclaw/workspace
      - /Users/teddy/labo_portal:/home/node/labo_portal
      - ./mie_data:/home/node/.openclaw/workspace/data
    ports:
      - "18790:18789"
      - "18793:8800"
    networks:
      - mie-net
      - shared-agents
    restart: on-failure
    command: sh -c "cd /home/node/labo_portal && node dist/app.js >> /tmp/labo_portal.log 2>&1 & exec openclaw gateway"
    env_file:
      - ./instances/mie/.env
    environment:
      - TZ=Asia/Tokyo
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # メフィ（CCO・レビュー担当）
  mephi:
    build: .
    image: bonsoleil/openclaw:latest
    container_name: mephi-openclaw
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    volumes:
      - ./instances/mephi/.openclaw:/home/node/.openclaw
      - ./sample_workspace/mephi:/home/node/.openclaw/workspace
      - ./mephi_data:/home/node/.openclaw/workspace/data
      - ./instances/mephi/labo_portal:/home/node/labo_portal
      - ./mephi_data:/home/node/labo_portal/data
      - ./instances/mephi/labo_portal.env:/home/node/.labo_portal_env
    ports:
      - "18791:18789"
      - "8800:8800"
    networks:
      - mephi-net
      - shared-agents
    command: sh -c "cd /home/node/labo_portal && node dist/app.js >> /tmp/labo_portal.log 2>&1 & exec openclaw gateway"
    restart: on-failure
    env_file:
      - ./instances/mephi/.env
    environment:
      - TZ=Asia/Tokyo
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # bon-soleil RAG Service — ChromaDB黒箱コンテナ
  rag:
    build:
      context: ./rag_service
    container_name: rag-service
    restart: unless-stopped
    environment:
      - CHROMA_PATH=/data/chroma
      - DEFAULT_COLLECTION=default
    volumes:
      - rag_data:/data
    ports:
      - "3001:3001"
    networks:
      - shared-agents
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mie-net:
    driver: bridge
  mephi-net:
    driver: bridge
  shared-agents:
    driver: bridge

  # shared-db:
  #   driver: bridge

volumes:
  rag_data:
