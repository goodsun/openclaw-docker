# bon-soleil Holdings — Container Office
# Mephi-approved configuration (98/100)
# Phase 1: Alice PoC

services:
  # Abu（XPathGenieサイドキック / エージェント実験枠）
  abu:
    build: .
    image: bonsoleil/openclaw:latest
    container_name: abu-openclaw
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    volumes:
      - ./instances/abu/.openclaw:/home/node/.openclaw
      - ./instances/abu/workspace:/home/node/workspace
    ports:
      - "18790:18789"
      - "18793:8800"
    networks:
      - abu-net
      - shared-agents
    restart: on-failure
    env_file:
      - ./instances/abu/.env
    environment:
      - TZ=Asia/Tokyo
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # メフィ（CCO・レビュー担当）
  mephi:
    build: .
    image: bonsoleil/openclaw:latest
    container_name: mephi-openclaw
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    volumes:
      - ./instances/mephi/.openclaw:/home/node/.openclaw
      - ./instances/mephi/workspace:/home/node/workspace
    ports:
      - "18791:18789"
      - "8800:8800"
    networks:
      - mephi-net
      - shared-agents
    restart: on-failure
    env_file:
      - ./instances/mephi/.env
    environment:
      - TZ=Asia/Tokyo
      - TERM=xterm-256color
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # bon-soleil RAG Service — ChromaDB黒箱コンテナ
  rag:
    build:
      context: ./rag_service
    container_name: rag-service
    restart: unless-stopped
    environment:
      - CHROMA_PATH=/data/chroma
      - DEFAULT_COLLECTION=default
    volumes:
      - rag_data:/data
    ports:
      - "3001:3001"
    networks:
      - shared-agents
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  abu-net:
    driver: bridge
  mephi-net:
    driver: bridge
  shared-agents:
    driver: bridge

  # shared-db:
  #   driver: bridge

volumes:
  rag_data:
