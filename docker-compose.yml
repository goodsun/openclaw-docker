# bon-soleil Holdings — Container Office
# Mephi-approved configuration (98/100)
# Phase 1: Alice PoC

services:
  # アリス（開発・技術担当）
  alice:
    build: .
    image: bonsoleil/openclaw:latest
    container_name: alice-openclaw
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    volumes:
      - ./instances/alice/workspace:/home/node/workspace
      - ./instances/alice/sessions:/home/node/sessions
      - ./instances/alice/config:/home/node/config
      - ./instances/alice/.openclaw:/home/node/.openclaw
    ports:
      - "18790:18789"
    networks:
      - alice-net
    restart: on-failure
    env_file:
      - ./instances/alice/.env
    environment:
      - TZ=Asia/Tokyo
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

