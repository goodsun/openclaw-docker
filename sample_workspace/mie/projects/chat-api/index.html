<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiblioChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Rounded Mplus 1c', -apple-system, sans-serif;
      background: linear-gradient(135deg, #F5F0E8 0%, #EDE4D8 50%, #F0E8DC 100%);
      color: #5C4A3A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      animation: fadeUp 1s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .home-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      color: #8B7060;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      z-index: 100;
    }
    .home-link:hover {
      color: #6B5344;
    }
    header {
      text-align: center;
      padding: clamp(1.5rem, 3vw, 2rem);
      padding-bottom: clamp(1rem, 2vw, 1.5rem);
    }
    header h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      margin-bottom: 0.4em;
      color: #5C4A3A;
      font-weight: 700;
    }
    header p {
      color: #9B8578;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 500;
    }
    .footer {
      text-align: center;
      padding: clamp(0.8rem, 2vw, 1.2rem);
      color: #9B8578;
      font-size: clamp(0.75rem, 2vw, 0.85rem);
    }
    .footer a {
      color: #8B7060;
      text-decoration: none;
    }
    .footer a:hover { 
      color: #6B5344; 
      text-decoration: underline;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: clamp(0.5rem, 3vw, 1.5rem);
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      margin-bottom: 1.2rem;
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }
    .msg.user { 
      flex-direction: row-reverse; 
    }
    .msg .avatar {
      margin-right: 10px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(200, 180, 160, 0.3);
    }
    .msg.assistant .avatar {
      background-size: cover;
      background-position: center;
    }
    .msg .bubble {
      max-width: 80%;
      padding: 1rem 1.2rem;
      border-radius: 20px;
      line-height: 1.6;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(200, 180, 160, 0.3);
    }
    .msg.assistant .bubble {
      background: rgba(255, 255, 255, 0.6);
      color: #5C4A3A;
      border-bottom-left-radius: 6px;
    }
    .msg.assistant .bubble strong { color: #8B7060; }
    .msg.user .bubble {
      background: rgba(184, 144, 111, 0.3);
      color: #5C4A3A;
      border-bottom-right-radius: 6px;
    }
    .input-row {
      display: flex;
      gap: 0.8rem;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 0 clamp(0.5rem, 3vw, 1.5rem);
      margin-bottom: clamp(1rem, 2vw, 1.5rem);
    }
    #textInput {
      flex: 1;
      padding: 1rem 1.2rem;
      border-radius: 24px;
      border: 2px solid rgba(139, 112, 96, 0.3);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      color: #5C4A3A;
      font-size: 1rem;
      outline: none;
      font-family: inherit;
      transition: border-color 0.3s ease;
    }
    #textInput:focus { 
      border-color: #8B7060; 
    }
    #textInput::placeholder {
      color: #9B8578;
    }
    #sendBtn {
      padding: 1rem 1.5rem;
      border-radius: 24px;
      border: none;
      background: #B8906F;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      transition: background-color 0.3s ease;
    }
    #sendBtn:hover {
      background: #9B7A5E;
    }
    #sendBtn:active {
      transform: translateY(1px);
    }
    .typing-dots span {
      display: inline-block;
      font-size: 1.5em;
      line-height: 1;
      animation: typingBounce 1.2s infinite;
      color: #8B7060;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <a href="/" class="home-link">← Home</a>
  
  <header>
    <h1>Biblio Chat</h1>
    <p>ねこ司書のリンちゃんに何でも聞いてみよう。</p>
  </header>

  <div id="chat"></div>

  <div class="input-row">
    <input type="text" id="textInput" placeholder="何でも話しかけてね..." />
    <button id="sendBtn">送信</button>
  </div>

  <div class="footer">
    <a href="/">← Home</a>
  </div>

  <script>
    const API_URL = '/chat/chat';
    const chat = document.getElementById('chat');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');

    let conversationHistory = [];  // 会話履歴（直近10往復=20メッセージ）

    // Text input
    sendBtn.addEventListener('click', () => {
      const text = textInput.value.trim();
      if (!text) return;
      addMessage('user', text);
      sendMessage(text);
      textInput.value = '';
    });

    let isComposing = false;
    textInput.addEventListener('compositionstart', () => { isComposing = true; });
    textInput.addEventListener('compositionend', () => { isComposing = false; });
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isComposing) {
        e.preventDefault();
        const text = textInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        sendMessage(text);
        textInput.value = '';
      }
    });

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const avatar = role === 'user' ? '<span style="font-size:2.2rem;">👤</span>' : '<img src="/images/rin_icon.jpg" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">'
      div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${escapeHtml(text)}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function linkify(text) {
      const escaped = escapeHtml(text);
      return escaped
        .replace(/\n/g, '<br>')
        // マークダウンリンク [text](url) を先に変換
        .replace(
          /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener" style="color:#8B7060;text-decoration:underline;">$1</a>'
        )
        // 残りの生URL（既にaタグ内のものは除外）
        .replace(
          /(?<!href="|">)(https?:\/\/[^\s<)]+)/g,
          '<a href="$1" target="_blank" rel="noopener" style="color:#8B7060;text-decoration:underline;">$1</a>'
        )
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    async function sendMessage(text) {
      const msgDiv = addMessage('assistant', '');
      const bubble = msgDiv.querySelector('.bubble');
      bubble.innerHTML = '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
      let fullText = '';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, mode: 'default', history: conversationHistory }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') break;
              try {
                const parsed = JSON.parse(data);
                if (parsed.content) {
                  fullText += parsed.content;
                  bubble.innerHTML = linkify(fullText);
                  chat.scrollTop = chat.scrollHeight;
                }
              } catch {}
            }
          }
        }

        // 会話履歴に追加（直近20メッセージに制限）
        conversationHistory.push({ role: 'user', content: text });
        if (fullText) {
          conversationHistory.push({ role: 'assistant', content: fullText });
        }
        if (conversationHistory.length > 20) {
          conversationHistory = conversationHistory.slice(-20);
        }

      } catch (err) {
        bubble.textContent = '接続エラーが発生しました。';
        console.error(err);
      }
    }
    // 起動時の挨拶
    addMessage('assistant', 'Niyaさんの研究のことについてなら、わたしに何でも聞いてね！🐱');
  </script>
</body>
</html>
